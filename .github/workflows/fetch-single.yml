name: Fetch Single Company

on:
  workflow_call:
    inputs:
      company:
        required: true
        type: string
        description: '公司名称'
      fetcher:
        required: false
        type: string
        default: 'stealth'
        description: '使用的抓取器 (http, playwright, stealth)'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium
      
      - name: Fetch ${{ inputs.company }}
        id: fetch
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p output
          # 完整的公司名到脚本名映射（所有14家公司）
          declare -A COMPANY_MAP=(
            ["AppLovin"]="applovin"
            ["BIGO Ads"]="bigo_ads"
            ["Criteo"]="criteo"
            ["Magnite"]="magnite"
            ["mobvista"]="mobvista"
            ["Moloco"]="moloco"
            ["PubMatic"]="pubmatic"
            ["TopOn"]="topon"
            ["Taboola"]="taboola"
            ["Teads"]="teads"
            ["TTD"]="ttd"
            ["Unity"]="unity"
            ["Viant Technology"]="viant"
            ["Zeta Global"]="zeta"
          )
          COMPANY="${{ inputs.company }}"
          COMPANY_KEY=${COMPANY_MAP[$COMPANY]:-$COMPANY}
          echo "company_key=${COMPANY_KEY}" >> $GITHUB_OUTPUT
          echo "Running fetch_${COMPANY_KEY}_only.py for ${COMPANY}"
          python fetch_${COMPANY_KEY}_only.py
      
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.company }}-result
          path: output/${{ steps.fetch.outputs.company_key }}_result.json
          retention-days: 1
          if-no-files-found: ignore
