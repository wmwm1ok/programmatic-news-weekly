name: Weekly Report - Parallel

# 正式发布入口：
# 1. 定时周报使用本工作流
# 2. 手动发布周报也优先使用本工作流
# 3. 旧版 weekly-report.yml 仅保留兼容/调试用途

on:
  # 定时触发：北京时间每周一早上 06:13
  # UTC 周日 22:13 = 北京时间周一 06:13 (UTC+8)
  schedule:
    - cron: '13 22 * * 0'
  
  # 手动触发
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # 阶段1：并行抓取所有13家公司 + 行业资讯
  fetch-applovin:
    uses: ./.github/workflows/fetch-single.yml
    with:
      company: AppLovin
    secrets: inherit
  
  fetch-bigo:
    uses: ./.github/workflows/fetch-single.yml
    with:
      company: BIGO Ads
    secrets: inherit
  
  fetch-criteo:
    uses: ./.github/workflows/fetch-single.yml
    with:
      company: Criteo
    secrets: inherit
  
  fetch-magnite:
    uses: ./.github/workflows/fetch-single.yml
    with:
      company: Magnite
    secrets: inherit
  
  fetch-mobvista:
    uses: ./.github/workflows/fetch-single.yml
    with:
      company: mobvista
    secrets: inherit
  
  fetch-moloco:
    uses: ./.github/workflows/fetch-single.yml
    with:
      company: Moloco
    secrets: inherit
  
  fetch-pubmatic:
    uses: ./.github/workflows/fetch-single.yml
    with:
      company: PubMatic
    secrets: inherit
  
  fetch-taboola:
    uses: ./.github/workflows/fetch-single.yml
    with:
      company: Taboola
    secrets: inherit
  
  fetch-teads:
    uses: ./.github/workflows/fetch-single.yml
    with:
      company: Teads
    secrets: inherit
  
  fetch-ttd:
    uses: ./.github/workflows/fetch-single.yml
    with:
      company: TTD
    secrets: inherit
  
  fetch-unity:
    uses: ./.github/workflows/fetch-single.yml
    with:
      company: Unity
    secrets: inherit
  
  fetch-viant:
    uses: ./.github/workflows/fetch-single.yml
    with:
      company: Viant Technology
    secrets: inherit
  
  fetch-zeta:
    uses: ./.github/workflows/fetch-single.yml
    with:
      company: Zeta Global
    secrets: inherit
  
  fetch-industry:
    uses: ./.github/workflows/fetch-industry.yml
    secrets: inherit
  
  # 阶段2：main 只负责整合所有结果
  generate-report:
    needs: [fetch-applovin, fetch-bigo, fetch-criteo, fetch-magnite, 
            fetch-mobvista, fetch-moloco, fetch-pubmatic, fetch-taboola,
            fetch-teads, fetch-ttd, fetch-unity, fetch-viant, fetch-zeta,
            fetch-industry]
    if: always()  # 即使前面有失败也运行
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*-result"
          merge-multiple: true
      
      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls -la artifacts/
      
      - name: Integrate and send report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM || secrets.EMAIL_USERNAME }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || 'wangmeng42@baidu.com' }}
        run: |
          python integrate_and_send.py
      
      - name: Upload final report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-final
          path: |
            output/*.html
            output/*.md
          retention-days: 30

  deploy-pages:
    needs: generate-report
    if: ${{ needs.generate-report.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download final report artifact
        uses: actions/download-artifact@v4
        with:
          name: weekly-report-final
          path: report

      - name: Prepare Pages site
        id: report_meta
        run: |
          mkdir -p site/reports
          latest_report="$(find report -maxdepth 1 -type f -name '*.html' | sort | tail -n 1)"
          latest_markdown="${latest_report%.html}.md"
          cp "$latest_report" site/index.html
          cp "$latest_report" "site/reports/$(basename "$latest_report")"
          if [ -f "$latest_markdown" ]; then
            cp "$latest_markdown" site/latest.md
            cp "$latest_markdown" "site/reports/$(basename "$latest_markdown")"
          fi
          if [ -d deploy/assets ]; then
            mkdir -p site/assets
            cp -R deploy/assets/. site/assets/
          fi
          echo "latest_report=$latest_report" >> "$GITHUB_OUTPUT"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
